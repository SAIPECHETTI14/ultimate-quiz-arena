<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap">
  <link rel="stylesheet" href="../css/features.css">
</head>
<body>
  <main class="feature-shell">
    <div class="feature-header">
      <div>
        <h1>Admin Dashboard</h1>
        <p class="muted">Monitor users, scores, and recent quiz activity.</p>
      </div>
      <a class="feature-link" href="../index.html">Home</a>
    </div>

    <section id="adminGate" class="feature-panel">Checking admin access...</section>

    <section id="adminContent" style="display:none;">
      <div class="feature-grid">
        <div class="feature-panel">
          <h2 id="totalUsers">0</h2>
          <p class="muted">Users</p>
        </div>
        <div class="feature-panel">
          <h2 id="totalScores">0</h2>
          <p class="muted">Saved Scores</p>
        </div>
        <div class="feature-panel">
          <h2 id="averageScore">0%</h2>
          <p class="muted">Average Score</p>
        </div>
      </div>

      <div class="feature-panel" style="margin-top:18px;">
        <h2>Recent Scores</h2>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Player</th>
                <th>Email</th>
                <th>Category</th>
                <th>Score</th>
                <th>Date</th>
              </tr>
            </thead>
            <tbody id="adminRows"></tbody>
          </table>
        </div>
      </div>
    </section>
  </main>

  <script type="module" src="../js/admin.js"></script>
</body>
</html>
