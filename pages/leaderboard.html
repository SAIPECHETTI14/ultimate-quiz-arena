<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0">

  <title>
    Leaderboard
  </title>

  <link
    rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap">

  <link
    rel="stylesheet"
    href="../css/leaderboard.css">

</head>

<body>

  <!-- LOADING -->

  <div id="loadingScreen">

    <div class="loader"></div>

    <h2>
      Loading Leaderboard...
    </h2>

  </div>

  <!-- MAIN -->

  <main class="leaderboard-container">

    <div class="leaderboard-card">

      <h1>
        Ultimate Quiz Arena Leaderboard
      </h1>

      <p class="subtitle">
        Global Top Players
      </p>

      <!-- TABLE -->

      <div class="table-wrapper">

        <table>

          <thead>

            <tr>

              <th>Rank</th>
              <th>Player</th>
              <th>Score</th>
              <th>Total</th>
              <th>Date</th>

            </tr>

          </thead>

          <tbody id="leaderboardBody">

          </tbody>

        </table>

      </div>

      <!-- BUTTONS -->

      <div class="buttons">

        <button id="homeBtn">

          Home

        </button>

      </div>

    </div>

  </main>

  <script
    type="module"
    src="../js/leaderboard.js">
  </script>

</body>

</html>
