<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0">

  <title>
    Leaderboard
  </title>

  <link
    rel="stylesheet"
    href="../css/leaderboard.css">

</head>

<body>

  <!-- LOADING -->

  <div id="loadingScreen">

    <div class="loader"></div>

    <h2>
      Loading Leaderboard...
    </h2>

  </div>

  <!-- MAIN -->

  <main class="leaderboard-container">

    <div class="leaderboard-card">

      <!-- TITLE -->

      <h1>
        Ultimate Quiz Arena
      </h1>

      <p class="subtitle">

        Global Online Leaderboard

      </p>

      <!-- FILTERS -->

      <div class="filters">

        <!-- CATEGORY -->

        <div class="filter-box">

          <select id="categoryFilter">

            <option value="all">
              All Categories
            </option>

            <option value="coding">
              Coding
            </option>

            <option value="scienceLocal">
              Science
            </option>

            <option value="anime">
              Anime
            </option>

            <option value="moviesLocal">
              Movies
            </option>

            <option value="sportsLocal">
              Sports
            </option>

            <option value="aiLocal">
              AI Generated
            </option>

          </select>

        </div>

        <!-- DIFFICULTY -->

        <div class="filter-box">

          <select id="difficultyFilter">

            <option value="all">
              All Difficulty
            </option>

            <option value="easy">
              Easy
            </option>

            <option value="medium">
              Medium
            </option>

            <option value="hard">
              Hard
            </option>

          </select>

        </div>

        <!-- QUESTIONS -->

        <div class="filter-box">

          <select id="amountFilter">

            <option value="all">
              All Questions
            </option>

            <option value="5">
              5 Questions
            </option>

            <option value="10">
              10 Questions
            </option>

            <option value="20">
              20 Questions
            </option>

            <option value="30">
              30 Questions
            </option>

          </select>

        </div>

      </div>

      <!-- TABLE -->

      <div class="table-wrapper">

        <table>

          <thead>

            <tr>

              <th>Rank</th>

              <th>Player</th>

              <th>Category</th>

              <th>Difficulty</th>

              <th>Score</th>

              <th>Date</th>

            </tr>

          </thead>

          <tbody id="leaderboardBody">

          </tbody>

        </table>

      </div>

      <!-- BUTTONS -->

      <div class="buttons">

        <button id="homeBtn">

          Home

        </button>

      </div>

    </div>

  </main>

  <!-- SCRIPT -->

  <script
    type="module"
    src="../js/leaderboard.js">
  </script>

</body>

</html>
