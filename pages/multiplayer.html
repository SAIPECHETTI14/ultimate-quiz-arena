<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Multiplayer Rooms</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap">
  <link rel="stylesheet" href="../css/features.css">
</head>
<body>
  <main class="feature-shell">
    <div class="feature-header">
      <div>
        <h1>Multiplayer Rooms</h1>
        <p class="muted">Create or join a room, then start a shared quiz setup.</p>
      </div>
      <a class="feature-link" href="../index.html">Home</a>
    </div>

    <section class="feature-panel">
      <div class="form-grid">
        <input id="roomCodeInput" type="text" placeholder="Room code">
        <button id="createRoomBtn" type="button">Create Room</button>
        <button id="joinRoomBtn" type="button">Join Room</button>
      </div>
      <p id="roomStatus" class="muted">No active room.</p>
      <div class="button-row">
        <button id="startRoomQuizBtn" type="button" disabled>Start Room Quiz</button>
      </div>
    </section>

    <section class="feature-grid" id="roomPlayers" style="margin-top:18px;"></section>
  </main>

  <script src="../js/multiplayer.js"></script>
</body>
</html>
