<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0">

  <title>
    Register
  </title>

  <link
    rel="stylesheet"
    href="../css/leaderboard.css">

  <style>

    body{

      display:flex;
      justify-content:center;
      align-items:center;

      min-height:100vh;

    }

    .auth-box{

      width:400px;

      padding:40px;

      border-radius:25px;

      background:rgba(255,255,255,0.08);

      backdrop-filter:blur(20px);

      box-shadow:
      0 0 30px rgba(0,0,0,0.3);

    }

    .auth-box h1{

      text-align:center;

      margin-bottom:30px;

    }

    .auth-box input{

      width:100%;

      padding:15px;

      margin-bottom:20px;

      border:none;

      outline:none;

      border-radius:15px;

      background:rgba(255,255,255,0.1);

      color:white;

      font-size:16px;

    }

    .auth-box button{

  width:100%;

  padding:15px;

  border:none;

  border-radius:16px;

  margin-top:14px;

  font-size:16px;

  font-weight:600;

  cursor:pointer;

  background:
  linear-gradient(
    90deg,
    #7b2ff7,
    #00c6ff
  );

  color:white;

  transition:0.3s;

}
.google-btn{

  margin-top:12px;

}

.reset-btn{

  margin-top:12px;

}

    .auth-box p{

      text-align:center;

      margin-top:20px;

    }

    .auth-box a{

      color:#00c6ff;

      text-decoration:none;

    }

    .auth-message{
      min-height:22px;
      margin-top:14px;
      color:#00d9ff;
      text-align:center;
      font-size:0.92rem;
    }

    .auth-message.error{
      color:#fca5a5;
    }

  </style>

</head>

<body>

  <div class="auth-box">

    <h1>
      Create Account
    </h1>

    <form id="registerForm">

      <input
        type="text"
        id="username"
        placeholder="Username"
        required>

      <input
        type="email"
        id="email"
        placeholder="Email"
        required>

      <input
        type="password"
        id="password"
        placeholder="Password"
        required>

      <button type="submit">

        Register

      </button>
      <button
  type="button"
  id="googleRegisterBtn">

  Continue With Google

</button>

    </form>

    <p id="authMessage" class="auth-message"></p>

    <p>

      Already have account?

      <a href="login.html">

        Login

      </a>

    </p>

  </div>

  <script
    type="module"
    src="../js/auth.js">
  </script>

</body>

</html>
