<!DOCTYPE html>
<html lang="en">
<head>
  <meta
  name="description"
  content="Ultimate Quiz Arena - Advanced animated quiz game built using HTML CSS and JavaScript">

<meta
  name="keywords"
  content="Quiz App, JavaScript Quiz, HTML CSS JS Project">

<meta
  name="author"
  content="Sai pechetti">

  <meta charset="UTF-8">

  <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

  <title>Quiz Results</title>

 <link rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap">

<link rel="stylesheet" href="../css/result.css">


</head>

<body>

  <div class="result-container">

    <div class="result-card">

      <h1>
        Quiz Completed!
      </h1>

      <div class="score-circle">
        <span id="scoreText">
          0%
        </span>
      </div>

      <div class="stats">

        <div class="stat-box">
          <h2 id="correctAnswers">
            0
          </h2>
          <p>Correct</p>
        </div>

        <div class="stat-box">
          <h2 id="wrongAnswers">
            0
          </h2>
          <p>Wrong</p>
        </div>

        <div class="stat-box">
          <h2 id="timeTaken">
            0s
          </h2>
          <p>Time</p>
        </div>

      </div>

      <h2 id="message"></h2>

      <div class="buttons">

        <button id="restartBtn">
          Play Again
        </button>

        <button id="leaderboardBtn">
          Leaderboard
        </button>

        <button id="shareBtn">
          Share Result
        </button>

      </div>

    </div>

  </div>

  <canvas id="confettiCanvas"></canvas>

  <script 
     type="module"
     src="../js/result.js"></script>

</body>
</html>
